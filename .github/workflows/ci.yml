name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and test the solution
  build-and-test:
    runs-on: ubuntu-latest
    name: Build & Test
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: pos_test
          POSTGRES_USER: pos_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore dependencies
        run: dotnet restore OfflineFirstPOS.sln

      - name: Build solution
        run: dotnet build OfflineFirstPOS.sln -c Release --no-restore

      - name: Run unit tests (Shared.Core)
        run: dotnet test src/Shared.Core/Shared.Core.csproj -c Release --no-build --logger "console;verbosity=detailed" --collect:"XPlat Code Coverage"

      - name: Run unit tests (Mobile)
        run: dotnet test src/Mobile/Tests/Mobile.Tests.csproj -c Release --no-build --logger "console;verbosity=detailed" --collect:"XPlat Code Coverage"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.cobertura.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Code quality checks
  code-quality:
    runs-on: ubuntu-latest
    name: Code Quality
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore OfflineFirstPOS.sln

      - name: Analyze code with StyleCop
        run: dotnet build OfflineFirstPOS.sln -c Release --no-restore /p:EnforceCodeStyleInBuild=true
        continue-on-error: true

  # Build Docker images
  build-docker:
    runs-on: ubuntu-latest
    name: Build Docker Images
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        include:
          - dockerfile: Dockerfile.server
            image-name: server
          - dockerfile: Dockerfile.webdashboard
            image-name: webdashboard
          - dockerfile: Dockerfile.tests
            image-name: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.image-name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Security scanning
  security-scan:
    runs-on: ubuntu-latest
    name: Security Scan
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Integration tests with Docker Compose
  integration-tests:
    runs-on: ubuntu-latest
    name: Integration Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images for testing
        run: |
          docker-compose build server webdashboard
        env:
          POSTGRES_PASSWORD: test_password
          REDIS_PASSWORD: test_password
          JWT_SECRET_KEY: test-secret-key-for-ci

      - name: Start services
        run: |
          docker-compose up -d postgres redis
          sleep 10
        env:
          POSTGRES_PASSWORD: test_password
          REDIS_PASSWORD: test_password

      - name: Run health checks
        run: |
          docker-compose ps
          docker-compose exec -T postgres pg_isready -U pos_user -d pos_multi_business
          docker-compose exec -T redis redis-cli ping

      - name: Cleanup
        if: always()
        run: docker-compose down -v

  # Notify on failure
  notify-failure:
    runs-on: ubuntu-latest
    name: Notify Failure
    needs: [build-and-test, code-quality, build-docker, security-scan, integration-tests]
    if: failure()
    
    steps:
      - name: Notify on failure
        run: |
          echo "CI Pipeline failed for commit ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
          echo "Author: ${{ github.actor }}"
