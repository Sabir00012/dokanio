name: Status Badge

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

permissions:
  contents: read

jobs:
  update-badge:
    runs-on: ubuntu-latest
    name: Update Status Badge
    
    steps:
      - name: Check workflow status
        id: status
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "BADGE_COLOR=green" >> $GITHUB_OUTPUT
            echo "BADGE_TEXT=passing" >> $GITHUB_OUTPUT
          else
            echo "BADGE_COLOR=red" >> $GITHUB_OUTPUT
            echo "BADGE_TEXT=failing" >> $GITHUB_OUTPUT
          fi

      - name: Create badge
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const badge = `[![CI Status](https://img.shields.io/badge/CI-${{ steps.status.outputs.BADGE_TEXT }}-${{ steps.status.outputs.BADGE_COLOR }})](https://github.com/${{ github.repository }}/actions)`;
            console.log(badge);
